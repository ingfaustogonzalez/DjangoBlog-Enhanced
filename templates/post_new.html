{% extends "base.html" %}

{% block content %}
{% if user.is_authenticated %}
<h1>New Post</h1>
<form method="post">
    {% csrf_token %}
    <p>{{ form.title }}</p>
    <p>{{ form.body }}</p>
    <input type="submit" value="Save">
</form>
{% else %}
<p>You must be logged in to create a new post.</p>
{% endif %}
{% endblock content %}
