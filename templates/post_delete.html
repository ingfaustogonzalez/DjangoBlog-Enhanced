{% extends "base.html" %}

{% block content %}
{% if user.is_authenticated and user == post.author %}
<h1>Delete Post</h1>
<form method="post">
    {% csrf_token %}
    <p>Are you sure you want to delete "{{ post.title }}"?</p>
    <input type="submit" value="Confirm">
</form>
{% endif %}
{% endblock content %}
